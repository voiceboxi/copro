name: Aperçu web GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Déploiement sur la branche gh-pages (Settings → Pages → branch gh-pages / root)
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Build web (Expo export)
        run: npm run build:web
        env:
          EXPO_BASE_URL: /copro

      - name: Désactiver Jekyll (dossiers _expo)
        run: touch dist/.nojekyll

      - name: Publier sur gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: 'Deploy COPRO web preview'
