name: Aperçu web GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Build web (Expo export)
        run: npm run build:web
        env:
          EXPO_BASE_URL: /copro

      - name: Préparer dist (Jekyll + routes)
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - name: Publier sur gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: 'Deploy COPRO web preview'

      - name: Activer GitHub Pages (API)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Activation de GitHub Pages depuis la branche gh-pages..."
          gh api --method POST "/repos/${GITHUB_REPOSITORY}/pages" \
            -f build_type=legacy \
            -f "source[branch]=gh-pages" \
            -f "source[path]=/" 2>/dev/null \
          || gh api --method PUT "/repos/${GITHUB_REPOSITORY}/pages" \
            -f build_type=legacy \
            -f "source[branch]=gh-pages" \
            -f "source[path]=/"
          echo "Pages activé. URL: https://voiceboxi.github.io/copro/"
